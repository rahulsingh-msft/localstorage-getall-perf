<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LocalStorage Worker</title>
</head>
<body>
  <script>
    "use strict";

    // Parse command from URL search params.
    const params = new URLSearchParams(window.location.search);
    const cmd = params.get("cmd");

    if (cmd === "measure") {
      // Measure the time for the first localStorage access, which triggers
      // the synchronous GetAll() Mojo IPC in the renderer.
      try {
        const t0 = performance.now();
        const len = localStorage.length;
        const t1 = performance.now();
        window.parent.postMessage(
          { type: "measure-result", duration: t1 - t0, length: len },
          "*"
        );
      } catch (e) {
        window.parent.postMessage(
          { type: "measure-error", error: e.message },
          "*"
        );
      }
    }

    // Listen for commands from the parent frame.
    window.addEventListener("message", (event) => {
      const msg = event.data;
      if (!msg || !msg.type) return;

      if (msg.type === "populate") {
        populate(msg.numEntries, msg.valueSize);
      } else if (msg.type === "clear") {
        clearStorage();
      }
    });

    function populate(numEntries, valueSize) {
      try {
        localStorage.clear();

        // Pre-generate the value string once.
        const value = "a".repeat(valueSize);
        const reportInterval = Math.max(1, Math.floor(numEntries / 100));

        for (let i = 0; i < numEntries; i++) {
          localStorage.setItem("k_" + i, value);

          if (i % reportInterval === 0) {
            window.parent.postMessage(
              { type: "populate-progress", current: i, total: numEntries },
              "*"
            );
          }
        }

        window.parent.postMessage(
          {
            type: "populate-done",
            numEntries: numEntries,
            valueSize: valueSize,
          },
          "*"
        );
      } catch (e) {
        // Likely QuotaExceededError.
        window.parent.postMessage(
          {
            type: "populate-error",
            error: e.message,
            storedEntries: localStorage.length,
          },
          "*"
        );
      }
    }

    function clearStorage() {
      localStorage.clear();
      window.parent.postMessage({ type: "clear-done" }, "*");
    }
  </script>
</body>
</html>
